<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楕円曲線のブローアップ — 3D可視化</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #18181f;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8f0;
    --muted: #7070a0;
    --curve:  #4a9eff;
    --blowup: #34d9a0;
    --exc:    #ff6040;
    --fiber:  #a0a0c0;
    --accent: #4a9eff;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

  #canvas-wrap {
    position: fixed; inset: 0;
  }
  #glcanvas { width: 100%; height: 100%; display: block; cursor: grab; }
  #glcanvas:active { cursor: grabbing; }

  #ui {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 280px;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
    gap: 0;
    overflow-y: auto;
  }

  .ui-header {
    margin-bottom: 28px;
  }
  .ui-header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .ui-header .eq {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .ui-header .eq span { color: var(--accent); }

  .section { margin-bottom: 24px; }
  .section-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .param-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .param-label {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    width: 16px;
    flex-shrink: 0;
    font-style: italic;
  }
  .param-val {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    width: 44px;
    text-align: right;
    flex-shrink: 0;
  }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

  .toggle-group { display: flex; flex-direction: column; gap: 8px; }
  .toggle-item {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    transition: background 0.15s, border-color 0.15s;
  }
  .toggle-item:hover { background: rgba(255,255,255,0.03); }
  .toggle-item.on { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }
  .toggle-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .toggle-item:not(.on) .toggle-dot { opacity: 0.3; }
  .toggle-label { font-size: 12px; color: var(--muted); flex: 1; }
  .toggle-item.on .toggle-label { color: var(--text); }
  .toggle-math { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .info-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .info-chip-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.05em; }
  .info-chip-val { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); }
  .info-chip-val.smooth { color: var(--blowup); }
  .info-chip-val.singular { color: var(--exc); }

  .math-note {
    margin-top: auto;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
  }
  .math-note code {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    background: var(--bg3);
    padding: 1px 4px;
    border-radius: 3px;
    color: var(--accent);
  }

  #hint {
    position: fixed;
    bottom: 20px;
    right: 24px;
    font-size: 11px;
    color: var(--muted);
    pointer-events: none;
    letter-spacing: 0.04em;
    line-height: 1.8;
    text-align: right;
  }

  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.1em;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>

<div id="loading">INITIALIZING…</div>

<div id="canvas-wrap">
  <canvas id="glcanvas"></canvas>
</div>

<div id="ui">
  <div class="ui-header">
    <h1>Blow-up</h1>
    <div class="eq">y² = x³ + <span id="eq-a">−1</span>x + <span id="eq-b">0</span></div>
  </div>

  <div class="section">
    <div class="section-title">パラメータ</div>
    <div class="param-row">
      <div class="param-label">a</div>
      <input type="range" id="slA" min="-3" max="3" step="0.05" value="-1">
      <div class="param-val" id="vA">−1.00</div>
    </div>
    <div class="param-row">
      <div class="param-label">b</div>
      <input type="range" id="slB" min="-2" max="2" step="0.05" value="0">
      <div class="param-val" id="vB">0.00</div>
    </div>
    <div class="param-row">
      <div class="param-label" style="font-style:normal;font-size:11px">cam</div>
      <input type="range" id="slZ" min="2" max="10" step="0.1" value="5">
      <div class="param-val" id="vZ">5.0</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">表示切替</div>
    <div class="toggle-group">
      <div class="toggle-item on" id="btnCurve">
        <div class="toggle-dot" style="background:var(--curve)"></div>
        <div class="toggle-label">元の曲線 C</div>
        <div class="toggle-math">z=0</div>
      </div>
      <div class="toggle-item on" id="btnBU">
        <div class="toggle-dot" style="background:var(--blowup)"></div>
        <div class="toggle-label">ブローアップ C̃</div>
        <div class="toggle-math">y/x</div>
      </div>
      <div class="toggle-item on" id="btnE">
        <div class="toggle-dot" style="background:var(--exc)"></div>
        <div class="toggle-label">例外的除数 E</div>
        <div class="toggle-math">P¹</div>
      </div>
      <div class="toggle-item on" id="btnFibers">
        <div class="toggle-dot" style="background:var(--fiber)"></div>
        <div class="toggle-label">射影ファイバー</div>
        <div class="toggle-math">π⁻¹</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">曲線情報</div>
    <div class="info-grid">
      <div class="info-chip">
        <div class="info-chip-label">判別式 Δ</div>
        <div class="info-chip-val" id="chipDisc">—</div>
      </div>
      <div class="info-chip">
        <div class="info-chip-label">型</div>
        <div class="info-chip-val" id="chipType">—</div>
      </div>
      <div class="info-chip">
        <div class="info-chip-label">特異点</div>
        <div class="info-chip-val" id="chipSing">—</div>
      </div>
      <div class="info-chip">
        <div class="info-chip-label">属 g</div>
        <div class="info-chip-val" id="chipGenus">1</div>
      </div>
    </div>
  </div>

  <div class="math-note">
    ブローアップ写像: <code>π: Bl₀ℝ² → ℝ²</code><br>
    埋め込み: <code>(x,y) ↦ (x, y, y/x)</code><br>
    例外的除数: <code>E = π⁻¹(0,0) ≅ P¹</code><br><br>
    特異点 ↔ <code>Δ = −16(4a³+27b²) = 0</code>
  </div>
</div>

<div id="hint">
  ドラッグ：回転　スクロール：ズーム
</div>

<script>
const canvas = document.getElementById('glcanvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias: true, alpha: true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0f, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.08);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);
let camTheta = Math.PI / 6, camPhi = Math.PI / 3.5, camR = 5;

function updateCamera() {
  camera.position.set(
    camR * Math.sin(camPhi) * Math.cos(camTheta),
    camR * Math.cos(camPhi),
    camR * Math.sin(camPhi) * Math.sin(camTheta)
  );
  camera.lookAt(0, 0, 0);
}
updateCamera();

// Mouse drag
let isDragging = false, lastX = 0, lastY = 0;
canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  camTheta += (e.clientX - lastX) * 0.008;
  camPhi = Math.max(0.05, Math.min(Math.PI - 0.05, camPhi + (e.clientY - lastY) * 0.008));
  lastX = e.clientX; lastY = e.clientY;
  updateCamera();
});
canvas.addEventListener('wheel', e => {
  camR = Math.max(2, Math.min(12, camR + e.deltaY * 0.005));
  document.getElementById('slZ').value = camR;
  document.getElementById('vZ').textContent = camR.toFixed(1);
  updateCamera();
  e.preventDefault();
}, {passive: false});
// Touch
canvas.addEventListener('touchstart', e => { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; e.preventDefault(); }, {passive: false});
canvas.addEventListener('touchend', () => isDragging = false);
canvas.addEventListener('touchmove', e => {
  if (!isDragging) return;
  camTheta += (e.touches[0].clientX - lastX) * 0.01;
  camPhi = Math.max(0.05, Math.min(Math.PI - 0.05, camPhi + (e.touches[0].clientY - lastY) * 0.01));
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  updateCamera(); e.preventDefault();
}, {passive: false});

// Axes
const axGeom = new THREE.BufferGeometry();
const axPts = [];
const L = 2.5;
[[L,0,0,-L,0,0],[0,L,0,0,-L,0],[0,0,L,0,0,-L]].forEach(([x1,y1,z1,x2,y2,z2]) => {
  axPts.push(x1,y1,z1,x2,y2,z2);
});
axGeom.setAttribute('position', new THREE.Float32BufferAttribute(axPts, 3));
scene.add(new THREE.LineSegments(axGeom, new THREE.LineBasicMaterial({color:0x2a2a4a})));

// Axis labels (simple spheres at ends)
const endMat = new THREE.MeshBasicMaterial({color:0x2a2a4a});
const endGeo = new THREE.SphereGeometry(0.03,6,4);
[[L,0,0],[0,L,0],[0,0,L]].forEach(([x,y,z]) => {
  const m = new THREE.Mesh(endGeo, endMat);
  m.position.set(x,y,z);
  scene.add(m);
});

// Grid plane at z=0
const gridHelper = new THREE.GridHelper(5, 10, 0x1a1a2e, 0x1a1a2e);
gridHelper.material.transparent = true;
gridHelper.material.opacity = 0.6;
gridHelper.rotation.x = Math.PI / 2;
scene.add(gridHelper);

// Groups
const groups = {
  curve: new THREE.Group(),
  blowup: new THREE.Group(),
  exc: new THREE.Group(),
  fibers: new THREE.Group()
};
for (const g of Object.values(groups)) scene.add(g);

function makeTube(pts3d, color, rad = 0.022) {
  if (pts3d.length < 2) return null;
  const path = new THREE.CatmullRomCurve3(pts3d.map(p => new THREE.Vector3(p[0], p[1], p[2])));
  const geo = new THREE.TubeGeometry(path, Math.min(pts3d.length * 2, 600), rad, 8, false);
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color}));
}

function splitAndMakeTubes(allPts, color, rad, gap = 0.08) {
  const segments = [];
  let seg = [allPts[0]];
  for (let i = 1; i < allPts.length; i++) {
    const dx = allPts[i][0] - allPts[i-1][0];
    const dy = allPts[i][1] - allPts[i-1][1];
    const dz = allPts[i][2] - allPts[i-1][2];
    if (Math.sqrt(dx*dx+dy*dy+dz*dz) > gap) {
      if (seg.length > 1) segments.push(seg);
      seg = [allPts[i]];
    } else {
      seg.push(allPts[i]);
    }
  }
  if (seg.length > 1) segments.push(seg);
  return segments.map(s => makeTube(s, color, rad)).filter(Boolean);
}

function buildScene(a, b) {
  for (const g of Object.values(groups)) {
    while (g.children.length) g.remove(g.children[0]);
  }

  const N = 1500, R = 2.6;

  // Original curve in z=0 plane
  const o1 = [], o2 = [];
  for (let i = 0; i <= N; i++) {
    const x = -R + 2 * R * i / N;
    const rhs = x*x*x + a*x + b;
    if (rhs < 0) continue;
    const y = Math.sqrt(rhs);
    o1.push([x, y, 0]);
    o2.push([x, -y, 0]);
  }
  splitAndMakeTubes(o1, 0x4a9eff, 0.022).forEach(m => groups.curve.add(m));
  splitAndMakeTubes(o2, 0x4a9eff, 0.022).forEach(m => groups.curve.add(m));

  // Blowup curve: (x, y, t) where t = y/x
  const b1 = [], b2 = [];
  for (let i = 0; i <= N; i++) {
    const x = -R + 2 * R * i / N;
    if (Math.abs(x) < 0.015) continue;
    const rhs = x*x*x + a*x + b;
    if (rhs < 0) continue;
    const y = Math.sqrt(rhs);
    const t1 = y / x, t2 = -y / x;
    if (Math.abs(t1) <= 3) b1.push([x, y, t1]);
    if (Math.abs(t2) <= 3) b2.push([x, -y, t2]);
  }
  splitAndMakeTubes(b1, 0x34d9a0, 0.022).forEach(m => groups.blowup.add(m));
  splitAndMakeTubes(b2, 0x34d9a0, 0.022).forEach(m => groups.blowup.add(m));

  // Exceptional divisor E ≅ P¹ along z-axis
  const excPts = [];
  for (let i = 0; i <= 80; i++) excPts.push([0, 0, -3 + 6*i/80]);
  const excTube = makeTube(excPts, 0xff6040, 0.04);
  if (excTube) groups.exc.add(excTube);

  // Glowing sphere at origin
  const origGeo = new THREE.SphereGeometry(0.1, 16, 12);
  const origMat = new THREE.MeshBasicMaterial({color: 0xff6040, transparent: true, opacity: 0.6});
  groups.exc.add(new THREE.Mesh(origGeo, origMat));

  // Dot markers on E
  const dotGeo = new THREE.SphereGeometry(0.055, 10, 8);
  const dotMat = new THREE.MeshBasicMaterial({color: 0xff6040});
  [-2.5, -1.5, -0.5, 0.5, 1.5, 2.5].forEach(t => {
    const d = new THREE.Mesh(dotGeo, dotMat); d.position.set(0, 0, t); groups.exc.add(d);
  });

  // Fibers (projection lines from blowup back to curve)
  const fiberSources = [];
  const step = Math.max(1, Math.floor(b1.length / 10));
  for (let i = 0; i < b1.length; i += step) fiberSources.push(b1[i]);
  for (let i = 0; i < b2.length; i += step) fiberSources.push(b2[i]);

  fiberSources.forEach(([x, y, t]) => {
    const pts = [new THREE.Vector3(x, y, 0), new THREE.Vector3(x, y, t)];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({color: 0xa0a0c0, transparent: true, opacity: 0.35});
    groups.fibers.add(new THREE.Line(geo, mat));

    const dg = new THREE.SphereGeometry(0.04, 8, 6);
    const dm = new THREE.Mesh(dg, new THREE.MeshBasicMaterial({color: 0x4a9eff, transparent: true, opacity: 0.7}));
    dm.position.set(x, y, 0);
    groups.fibers.add(dm);

    const dg2 = new THREE.Mesh(dg.clone(), new THREE.MeshBasicMaterial({color: 0x34d9a0, transparent: true, opacity: 0.9}));
    dg2.position.set(x, y, t);
    groups.fibers.add(dg2);
  });

  // Info
  const disc = -16 * (4*a*a*a + 27*b*b);
  document.getElementById('chipDisc').textContent = disc.toFixed(2);
  const isSmooth = Math.abs(disc) > 0.5;
  document.getElementById('chipType').textContent = isSmooth ? '楕円曲線' : '特異曲線';
  document.getElementById('chipType').className = 'info-chip-val ' + (isSmooth ? 'smooth' : 'singular');
  document.getElementById('chipSing').textContent = isSmooth ? '無し' : '有り';
  document.getElementById('chipSing').className = 'info-chip-val ' + (isSmooth ? 'smooth' : 'singular');
  document.getElementById('chipGenus').textContent = isSmooth ? '1' : '0';

  const fmtNum = v => (v >= 0 ? '+' : '') + v.toFixed(2);
  document.getElementById('vA').textContent = fmtNum(a);
  document.getElementById('vB').textContent = fmtNum(b);
  document.getElementById('eq-a').textContent = fmtNum(a);
  document.getElementById('eq-b').textContent = fmtNum(b);
}

// Resize
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// Controls
document.getElementById('slA').addEventListener('input', update);
document.getElementById('slB').addEventListener('input', update);
document.getElementById('slZ').addEventListener('input', function() {
  camR = parseFloat(this.value);
  document.getElementById('vZ').textContent = camR.toFixed(1);
  updateCamera();
});

const toggleMap = {btnCurve: 'curve', btnBU: 'blowup', btnE: 'exc', btnFibers: 'fibers'};
for (const [id, key] of Object.entries(toggleMap)) {
  document.getElementById(id).addEventListener('click', function() {
    this.classList.toggle('on');
    groups[key].visible = this.classList.contains('on');
  });
}

function update() {
  const a = parseFloat(document.getElementById('slA').value);
  const b = parseFloat(document.getElementById('slB').value);
  buildScene(a, b);
}
update();

// Hide loading
setTimeout(() => {
  const l = document.getElementById('loading');
  l.style.opacity = '0';
  setTimeout(() => l.remove(), 500);
}, 400);

// Animate
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.005;
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
